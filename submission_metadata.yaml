# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Sonnet) for architecture design, code implementation,
  and iterative debugging. No candidate data was fed to any external LLM during
  ranking. The ranking system runs entirely offline using pre-computed embeddings
  from sentence-transformers (local model).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase hybrid ranker: (1) Pre-compute 384-dim sentence-transformer embeddings
  for 100K candidates + detect honeypots via 5 integrity checks (duration mismatch,
  expert-zero-duration, YOE vs career span, start-after-end, title-description mismatch).
  (2) At runtime, stream candidates through a 3-layer scoring pipeline: hard filters
  (honeypots, consulting-only, non-tech), composite fit score (skills 30%, career text 25%,
  title 10%, semantic 15%, YOE 10%, location 5%, education 5%), and a behavioral
  modifier (0.80-1.05x multiplier on availability, quality signals, notice period).
  Skill trust scoring penalizes claimed expertise without endorsement/duration evidence.
  Synonym groups prevent penalizing equivalent tools. Career text analysis uses recency
  weighting so recent experience contributes more than older roles. Runtime: ~20 seconds
  on CPU, 0 honeypots in top 100.

