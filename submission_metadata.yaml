# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Sonnet) for architecture design, code implementation,
  and iterative debugging. No candidate data was fed to any external LLM during
  ranking. The ranking system runs entirely offline using pre-computed embeddings
  from sentence-transformers (local model).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase hybrid ranker:

  Phase 1 — Pre-computation (run once, ~51 minutes on a 4-core CPU, no GPU):
  Generate 384-dim sentence-transformer embeddings (all-MiniLM-L6-v2) for all
  100K candidates and the job description. Simultaneously detect honeypot
  candidates via 4 structural integrity checks: duration mismatch between
  claimed and actual tenure, expert-proficiency skills with zero duration,
  claimed YOE exceeding career span by 3+ years, and jobs with start date
  after end date. 64 honeypots identified and indexed (in line with the
  spec's stated ~80 planted honeypots). A 5th signal — tech title paired
  with non-technical job descriptions — is tracked separately and applied
  as a soft scoring penalty rather than a hard filter, since it reflects
  fit quality rather than a logically-impossible profile.

  Phase 2 — Ranking (runtime ~25-40 seconds, CPU only, no network):
  Candidates are streamed through a 3-layer pipeline:

  Layer 1 — Hard filters: removes honeypots, consulting-only backgrounds (no
  product company experience), non-tech titles with no career relevance, and
  pure research profiles (high ML signal but zero production deployment
  evidence).

  Layer 2 — Composite fit score (7 dimensions):
    - Skills (30%): must-have skill weighted score (RAG, vector DBs, embeddings,
      semantic search, BM25, LTR etc.) + strong-signal skills + Python presence +
      skill trust score (proficiency × endorsements × duration)
    - Career relevance (25%): keyword hit scoring across retrieval, ML, production,
      and evaluation keyword sets with recency decay weighting; expanded retrieval
      keywords include HNSW, cross-encoder, bi-encoder, RRF, ColBERT, SPLADE etc.
      to reward candidates who built real systems without using product buzzwords
    - Title relevance (10%): tiered title scoring from Lead AI Engineer (1.0) down
      to non-technical roles (0.0)
    - Semantic similarity (15%): cosine similarity between candidate embedding and
      JD embedding, min-max normalized across the full candidate pool so the score
      spans 0-1 and earns its full weight allocation. The sandbox demo (small-sample
      mode) encodes embeddings live when the precomputed 100K index isn't present,
      so semantic similarity is never silently dropped to 0 in that environment.
    - Years of experience (10%): Gaussian fit centered at 7 years (sigma=3),
      with hard penalties outside 2-15 year range
    - Location (5%): Pune/Noida ideal (1.0), Tier-1 India cities (0.9),
      rest of India with relocation (0.8), rest of India (0.6)
    - Education (5%): institution tier + CS/AI field bonus + advanced degree bonus

  Layer 3 — Behavioral and trap-pattern penalties (multipliers on fit score):
    - Two-tier ghost candidate system based on the JD's explicit test case
      (technically strong but inactive/unresponsive candidates should be
      down-weighted): hard ghost (inactive 6m+, response rate <15%, not open
      to work) capped at 0.55-0.70x; soft ghost (recency <0.40, response rate
      <0.20, not open to work) capped at 0.70-0.80x; normal candidates range
      0.80-1.05x based on availability, profile quality, and notice period.
    - Job-hopper penalty: 0.70x for avg tenure <12 months, 0.85x for <18
      months, 1.0x otherwise — targets the JD's stated dislike of title-chasing
      via frequent company switches.
    - LangChain-only-recent trap penalty (0.65x): flags candidates whose most
      recent role (≤12 months) is LangChain/prompt-engineering-only with no
      pre-LLM-era IR/ranking substance anywhere in their career history —
      a pattern the JD explicitly states is planted in the dataset.
    - CV/speech/robotics-without-NLP-overlap trap penalty (0.70x): flags
      candidates whose skill profile is CV/speech/robotics-heavy with minimal
      genuine NLP/IR overlap, per the JD's stated disqualifier.
    - Closed-source-senior soft penalty (0.98x): senior candidates (5+ yrs)
      with no measurable external validation signal (github_activity_score),
      per the JD's framing of this as a soft signal, not a hard reject.
    - Visa-blocker penalty (0.55x): candidates who are simultaneously outside
      India, unwilling to relocate, and remote-only — reflecting the JD's
      explicit "no work visa sponsorship" constraint, which makes this
      combination a practical hiring blocker rather than a soft location
      preference (location's 5% fit-score weight alone was too small to
      reflect this).

  Tie-breaking: candidates with equal scores after rounding to the displayed
  precision are ordered by ascending candidate_id, computed after rounding
  (not on raw unrounded scores) to satisfy strict validator requirements.

  Result: 14,640 candidates filtered (including all 64 honeypots), 85,360
  scored, top 100 written to submission.csv. Zero honeypots in top 100.

